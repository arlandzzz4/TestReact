name: Deploy

on:
  push:
    branches: [ "main" ] # 사용하는 브랜치명 확인

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: react-frontend
    steps:
      # v3 대신 v4를 사용하여 Node.js 경고 해결
      - name: Checkout
        uses: actions/checkout@v4

      # 도커 로그인 (여기가 실패한다면 Secrets 오타 확인)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 이미지 빌드 및 푸시
      - name: Build and Push
        run: |
          docker build \
            --build-arg BUILD_MODE=production \
            -t ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest
      
      # EC2 접속 및 프론트엔드 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            # 1. 최신 프론트엔드 이미지 가져오기
            sudo docker compose pull frontend
            
            # 2. 기존 프론트엔드 컨테이너만 재시작
            # (이렇게 하면 DB나 백엔드는 건드리지 않고 프론트만 교체됩니다)
            sudo docker compose up -d frontend
            
            # 3. 미사용 이미지 정리
            sudo docker image prune -f