name: Frontend Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. 도커 빌드 시 ARG 주입 (중요!)
      - name: Docker Build & Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          # --build-arg를 통해 운영 환경임을 명시
          docker build --build-arg BUILD_MODE=production -t ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest

      # 2. EC2 접속 및 서비스 갱신
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            docker compose pull frontend
            docker compose up -d frontend
            docker image prune -f