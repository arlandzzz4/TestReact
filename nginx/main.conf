# 1. HTTP(80) -> HTTPS(443) 무조건 강제 이동
server {
    listen 80;
    server_name infomation-of-balance.xyz www.infomation-of-balance.xyz;
    return 301 https://$host$request_uri;
}

# 2. HTTPS(443) 실서비스 (모든 로직은 여기서 처리)
server {
    listen 443 ssl;
    server_name infomation-of-balance.xyz www.infomation-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/infomation-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infomation-of-balance.xyz/privkey.pem;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 리액트 정적 파일 서빙 (여기서 직접 수행)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 정적 자원 404 처리 (MIME 에러 방지)
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # API 서버 연동 (app-backend 이름 확인 필수)
    location /api/ {
        proxy_pass http://app-backend:8080/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger 설정
    location /swagger-ui {
        proxy_pass http://app-backend:8080;
        proxy_set_header Host $host;
    }

    location /v3 {
        proxy_pass http://app-backend:8080;
        proxy_set_header Host $host;
    }
}