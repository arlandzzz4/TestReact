# 프로젝트 루트/nginx/main.conf 최종본
server {
    listen 80;
    server_name infomation-of-balance.xyz www.infomation-of-balance.xyz;
    # http로 들어오면 자동으로 https로 토스!
    return 301 https://infomation-of-balance.xyz$request_uri;
}

# 2. HTTPS(443) 설정
server {
    listen 443 ssl;
    # www를 포함한 모든 도메인을 받습니다.
    server_name infomation-of-balance.xyz www.infomation-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/infomation-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infomation-of-balance.xyz/privkey.pem;

    # 보안 헤더 추가 (리더의 디테일)
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN"; # 프레임 관련 에러 방지

    location / {
        proxy_pass http://react-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api {
        proxy_pass http://api-server:8080;
        
        # ★ 아래 설정들이 있어야 백엔드가 클라이언트의 진짜 IP를 알 수 있습니다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정 (API 응답이 길어질 때 대비)
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}