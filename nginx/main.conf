# 1. HTTP(80) -> HTTPS(443) 강제 이동
server {
    listen 80;
    server_name information-of-balance.xyz www.information-of-balance.xyz;

    # [여기에 추가]: Certbot 인증을 위한 전용 통로
    # 리다이렉트(301)보다 먼저 실행되어야 하므로 맨 위에 둡니다.
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    # 인증 요청이 아닌 나머지만 HTTPS로 보냅니다.
    location / {
        return 301 https://information-of-balance.xyz$request_uri;
    }
}

# 2-A. HTTPS(443) - www 리다이렉트 (유지)
server {
    listen 443 ssl;
    server_name www.information-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/information-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/information-of-balance.xyz/privkey.pem;

    return 301 https://information-of-balance.xyz$request_uri;
}

# 2-B. HTTPS(443) 실서비스
server {
    listen 443 ssl;
    server_name information-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/information-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/information-of-balance.xyz/privkey.pem;

    # [안전을 위해 여기도 추가]: 혹시 모를 HTTPS 인증 요청 대비
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    client_max_body_size 50M;

    # 보안 헤더 (유지)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 서버 연동 및 기타 설정 (기존과 동일)
    location /api/ {
        proxy_pass http://backend:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /v3 {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}