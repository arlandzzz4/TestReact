# 프로젝트 루트/nginx/main.conf 최종본
server {
    listen 80;
    server_name infomation-of-balance.xyz;
    # http로 들어오면 자동으로 https로 토스!
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name infomation-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/infomation-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infomation-of-balance.xyz/privkey.pem;

    location / {
        proxy_pass http://react-app:80; 
        proxy_set_header Host $host;
    }

    location /api {
        proxy_pass http://api-server:8080;
        # ... (나머지 헤더 설정은 동일)
    }
}