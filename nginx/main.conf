# 1. HTTP(80) -> HTTPS(443) 강제 이동 (유지)
server {
    listen 80;
    server_name information-of-balance.xyz www.information-of-balance.xyz;
    return 301 https://information-of-balance.xyz$request_uri;
}

# 2-A. HTTPS(443) - www로 들어오는 경우 (리다이렉트 전용)
server {
    listen 443 ssl;
    server_name www.information-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/information-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/information-of-balance.xyz/privkey.pem;

    return 301 https://information-of-balance.xyz$request_uri;
}

# 2-B. HTTPS(443) 실서비스 (기존 로직 유지)
server {
    listen 443 ssl;
    server_name information-of-balance.xyz; # www 제거

    ssl_certificate /etc/letsencrypt/live/information-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/information-of-balance.xyz/privkey.pem;

    client_max_body_size 50M;

    # 보안 헤더 (유지)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 서버 연동 (슬래시 제거 유지 - 훌륭한 선택입니다!)
    location /api/ {
        proxy_pass http://backend:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger 및 기타 설정 (유지)
    location /swagger-ui {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /v3 {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}