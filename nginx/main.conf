# 1. HTTP(80) 블록
server {
    listen 80;
    server_name information-of-balance.xyz www.information-of-balance.xyz;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://information-of-balance.xyz$request_uri;
    }
}

# 2-A. HTTPS(443) - www 리다이렉트 블록
server {
    listen 443 ssl;
    server_name www.information-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/information-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/information-of-balance.xyz/privkey.pem;

    # 파일 업로드 기능이 있을 경우 Nginx 기본 제한(1MB)에 걸려 413 에러가 나는 것을 방지
    client_max_body_size 50M;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    return 301 https://information-of-balance.xyz$request_uri;
}

# 2-B. HTTPS(443) 실서비스 블록
server {
    listen 443 ssl;
    server_name information-of-balance.xyz;

    ssl_certificate /etc/letsencrypt/live/information-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/information-of-balance.xyz/privkey.pem;

    # [핵심] 리액트 location / 보다 위에 있어야 가로채이지 않습니다!
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 50M;

    # 보안 헤더 (유지)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 서버 연동 및 기타 설정 (기존과 동일)
    location /api/ {
        proxy_pass http://backend:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /v3 {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}