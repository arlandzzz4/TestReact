# 프로젝트 루트/nginx/main.conf
server {
    listen 443 ssl;
    server_name infomation-of-balance.xyz;

    # SSL 인증서 (Certbot이 가져온 파일)
    ssl_certificate /etc/letsencrypt/live/infomation-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infomation-of-balance.xyz/privkey.pem;

    # 1. 프론트엔드 (React 컨테이너로 전달)
    location / {
        proxy_pass http://react-app:80; 
        proxy_set_header Host $host;
    }

    # 2. 백엔드 (Spring Boot 컨테이너로 전달)
    location /api {
        proxy_pass http://api-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}