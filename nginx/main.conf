# 1. HTTP(80) -> HTTPS(443) 강제 리다이렉트
server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 이 부분이 중요합니다. JS/CSS 파일은 404를 내보내야지, index.html을 주면 안 됩니다!
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일(JS, CSS)은 없으면 404를 내보내야 합니다.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404; # 파일이 없으면 즉시 404 반환 (MIME 에러 방지)
    }
}

# 2. HTTPS(443) 실서비스 설정
server {
    listen 443 ssl;
    server_name infomation-of-balance.xyz www.infomation-of-balance.xyz;

    # SSL 인증서 경로 (volumes 마운트 경로와 일치해야 함)
    ssl_certificate /etc/letsencrypt/live/infomation-of-balance.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infomation-of-balance.xyz/privkey.pem;

    # 보안 헤더 (HSTS, 프레임 보안)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff"; # 추가 보안

    # 프론트엔드 (React)
    location / {
        proxy_pass http://react-frontend:80; # docker-compose 서비스명과 일치
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 서버 (Spring Boot)
    location /api/ {
        proxy_pass http://app-backend:8080/; # 서비스명 일치 및 끝 슬래시 주의
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Swagger UI 및 Docs
    location /swagger-ui {
        proxy_pass http://app-backend:8080; # 끝에 /를 빼서 경로를 그대로 유지
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v3 {
        proxy_pass http://app-backend:8080; # v3/api-docs 등 모든 하위 경로 포함
        proxy_set_header Host $host;
    }
}